<h1 style = "text-align: center;">Create New Project</h1>
<p style = "text-align: center;">Enter details to create a new project</p>

<form id="projectForm">
    <input type="text" id="title" placeholder="Project Title" required />
    
    <textarea id="description" placeholder="Description"></textarea>
    
    <input type="text" id="support" placeholder="Support Needed" required />

    <select id="stage" required>
        <option value="">Select Stage</option>
        <option value="idea">Idea</option>
        <option value="planning">Planning</option>
        <option value="development">Development</option>
    </select>

    <button type="submit">Create Project</button>
</form>
