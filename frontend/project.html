<!DOCTYPE html>
<html>
<head>
    <title>Project Details</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<a href="index.html">Back to Feed</a>

<h2 id="title"></h2>
<p id="description"></p>
<p id="stage"></p>
<p id="support"></p>
<p id="status"></p>

<hr>

<h3>Comments</h3>

<div id="comments"></div>

<form id="commentForm">
    <input type="text" id="commentText" placeholder="Write a comment..." required />
    <button type="submit">Post Comment</button>
</form>

<hr>

<h3>Collaboration</h3>

<!-- Request form (non-owner) -->
<div id="collabRequestSection" style="display:none;">
    <form id="collabForm">
        <textarea id="collabMessage" placeholder="Why do you want to collaborate?" required></textarea>
        <button type="submit">Request Collaboration</button>
    </form>
</div>

<!-- Requests list (owner only) -->
<div id="collabRequestsSection" style="display:none;">
    <h4>Collaboration Requests</h4>
    <div id="collabRequests"></div>
</div>

<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/project.js"></script>

</body>
</html>
