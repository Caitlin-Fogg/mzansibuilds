<!DOCTYPE html>
<html>
<head>
    <title>Project Details</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="navbar">

    <div class="nav-left">
        <img src="assets/logo.png" class="logo-small">
    </div>

    <div class="nav-right">
        <a href="index.html">
            <button>Live Feed 🏠</button>
        </a>

        <a href="celebration.html">
            <button>Celebration Wall 🎉</button>
        </a>
        
        <a href="profile.html">
            <button>Profile 👤</button>
        </a>

        <a href="my-projects.html">
            <button>My Projects 📌</button>
        </a>

        <button id="logoutBtn">Logout 🚪</button>
    </div>

</div>

<h2 id="title"></h2>
<p id="description"></p>
<p id="stage"></p>
<p id="support"></p>
<p id="status"></p>

<hr>

<h3>Milestones</h3>

<div id="milestones"></div>

<hr>

<h3>Comments</h3>

<div id="comments"></div>

<form id="commentForm">
    <input type="text" id="commentText" placeholder="Write a comment..." required />
    <button type="submit">Post Comment</button>
</form>

<hr>

<h3>Collaborations</h3>

<div id="collaborators"></div>

<!-- Request form (non-owner) -->
<div id="collabRequestSection" style="display:none;">
    <form id="collabForm">
        <textarea id="collabMessage" placeholder="Why do you want to collaborate?" required></textarea>
        <button type="submit">Request Collaboration</button>
    </form>
</div>

<!-- Requests list (owner only) -->
<div id="collabRequestsSection" style="display:none;">
    <div id="collabRequests"></div>
</div>

<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/project.js"></script>

</body>
</html>
